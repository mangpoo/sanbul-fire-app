<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>FF Prediction</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body>
<nav class="navbar navbar-light bg-light px-3">
  <a class="btn btn-primary me-2" href="/">Home</a>
  <a class="btn btn-primary" href="/prediction">FF Prediction</a>
</nav>

<div class="container mt-4" style="max-width:500px;">
  <h4>Fill in the data</h4>
  <form method="POST" action="/prediction">
    <div class="mb-2">
      <label>longitude(1-7)</label>
      <input type="text" name="longitude" class="form-control" placeholder="예: 5">
    </div>
    <div class="mb-2">
      <label>latitude(1-7)</label>
      <input type="text" name="latitude" class="form-control" placeholder="예: 6">
    </div>
    <div class="mb-2">
      <label>month(01-Jan ~ Dec-12)</label>
      <input type="text" name="month" class="form-control" placeholder="예: 01-Jan">
    </div>
    <div class="mb-2">
      <label>day(00-sun ~ 06-sat, 07-hol)</label>
      <input type="text" name="day" class="form-control" placeholder="예: 06-sat">
    </div>
    <div class="mb-2">
      <label>avg_temp</label>
      <input type="text" name="avg_temp" class="form-control" placeholder="예: 30">
    </div>
    <div class="mb-2">
      <label>max_temp</label>
      <input type="text" name="max_temp" class="form-control" placeholder="예: 35">
    </div>
    <div class="mb-2">
      <label>max_wind_speed</label>
      <input type="text" name="max_wind_speed" class="form-control" placeholder="예: 27">
    </div>
    <div class="mb-2">
      <label>avg_wind</label>
      <input type="text" name="avg_wind" class="form-control" placeholder="예: 15.7">
    </div>
    <button type="submit" class="btn btn-primary mt-2">Submit</button>
  </form>
  <p class="text-muted mt-3">© Seungwoon Kim</p>
</div>
</body>
</html>
